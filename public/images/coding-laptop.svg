<svg width="900" height="1100" viewBox="0 0 900 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .person { animation: floatPerson 4s ease-in-out infinite; transform-origin: center; }
    .screen { animation: screenGlow 2.4s ease-in-out infinite alternate; }
    .line1 { animation: typeLine1 2.4s ease-in-out infinite; transform-origin: left; }
    .line2 { animation: typeLine2 2.8s ease-in-out infinite; transform-origin: left; }
    .line3 { animation: typeLine3 3.2s ease-in-out infinite; transform-origin: left; }
    .icon { animation: iconFloat 3s ease-in-out infinite; }
    .iconTwo { animation-delay: .45s; }
    .iconThree { animation-delay: .9s; }
    .spark { animation: blink 1.8s ease-in-out infinite; transform-origin: center; }
    .sparkTwo { animation-delay: .55s; }
    @keyframes floatPerson {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
    @keyframes screenGlow {
      from { opacity: .78; }
      to { opacity: 1; }
    }
    @keyframes typeLine1 {
      0%, 100% { transform: scaleX(.42); }
      50% { transform: scaleX(1); }
    }
    @keyframes typeLine2 {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(.55); }
    }
    @keyframes typeLine3 {
      0%, 100% { transform: scaleX(.7); }
      50% { transform: scaleX(1); }
    }
    @keyframes iconFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: .25; transform: scale(.85); }
      50% { opacity: 1; transform: scale(1.08); }
    }
  </style>

